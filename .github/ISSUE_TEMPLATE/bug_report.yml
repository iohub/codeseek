name: Bug Report
description: File a bug report
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug! Please fill in the details below."
  - type: input
    id: version
    attributes:
      label: codeseek version
      placeholder: "0.1.17"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL2)
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - npm
        - brew
        - from source
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `codeseek ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs & output
      render: shell
